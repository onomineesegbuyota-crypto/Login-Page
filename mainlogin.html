<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Metadata and Page Title -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> Login Page</title>

    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Page Layout Styles */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* Main Container for Split Layout */
        .container {
            display: flex;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Left Side Image Styling */
        .image-side {
            flex: 1;
            background: #eff6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .image-side img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        /* Right Side Form Side Styling */
        .form-side {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header and Typography */
        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1rem;
            color: #6b7280;
        }

        /* Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        /* Input Field Styling */
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Shared Button Styles */
        button[type="submit"] {
            width: 100%;
            padding: 0.75rem 1.5rem;
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button[type="submit"]:active {
            transform: translateY(1px);
        }

        /* Login Button Colors */
        #login-form button[type="submit"] {
            background: #2563eb;
        }

        #login-form button[type="submit"]:hover {
            background: #1d4ed8;
        }

        /* signup Button Colors */
        #signup-form button[type="submit"] {
            background: #16a34a;
        }

        #signup-form button[type="submit"]:hover {
            background: #15803d;
        }

        /* Feedback Message Classes */
        .status {
            font-size: 0.875rem;
            text-align: center;
            min-height: 1.25rem;
            margin-top: 0.5rem;
        }

        .success {
            color: #059669;
        }

        .error {
            color: #dc2626;
        }

        /* Footer and Toggle Link */
        footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f3f4f6;
            text-align: center;
        }

        #toggle-btn {
            background: none;
            border: none;
            font-size: 0.875rem;
            font-weight: 500;
            color: #2563eb;
            cursor: pointer;
        }

        #toggle-btn:hover {
            text-decoration: underline;
        }

        /* Utility to Hide Elements */
        .hidden {
            display: none;
        }

        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                max-width: 450px;
            }
            .image-side {
                padding: 1.5rem;
            }
            .form-side {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Left Side: Image -->
        <div class="image-side">
            <img src="./images/login.jpg" alt="Login Illustration">
        </div>

        <!-- Right Side: Interaction Content -->
        <div class="form-side">
            <header>
                <h1 id="title">Login</h1>
                <p id="subtitle">Enter your credentials to continue</p>
            </header>

            <!-- Form for Existing Users -->
            <form id="login-form">
                <div>
                    <label for="login-email">Email</label>
                    <input id="login-email" type="email" required placeholder="name@example.com" />
                </div>
                <div>
                    <label for="login-password">Password</label>
                    <input id="login-password" type="password" required placeholder="••••••••" />
                </div>
                <button type="submit">Login</button>
                <p class="status" id="login-status"></p>
            </form>

            <!-- Form for New Users (Hidden by Default) -->
            <form id="signup-form" class="hidden">
                <div>
                    <label for="signup-name">Full Name</label>
                    <input id="signup-name" type="text" required placeholder="Enter your full name" />
                </div>
                <div>
                    <label for="signup-email">Email</label>
                    <input id="signup-email" type="email" required placeholder="Enter your email" />
                </div>
                <div>
                    <label for="signup-password">Password</label>
                    <input id="signup-password" type="password" required placeholder="Create a password" />
                </div>
                <button type="submit">Sign Up</button>
                <p class="status" id="signup-status"></p>
            </form>

            <!-- Footer for Switching Between Login/Signup -->
            <footer>
                <button id="toggle-btn">Don't have an account? Sign Up</button>
            </footer>
        </div>
    </div>


    <script>
        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const toggleBtn = document.getElementById('toggle-btn');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const USERS_KEY = 'simple_app_users';

        // State Variable to track active form
        let isLogin = true;

        // Fetch users from LocalStorage
        function getUsers() {
            return JSON.parse(localStorage.getItem(USERS_KEY) || '[]');
        }

        // Display Success/Error Messages
        function setStatus(id, msg, ok) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status ' + (ok ? 'success' : 'error');
        }

        // Toggle Between Login and Signup Views
        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            loginForm.classList.toggle('hidden', !isLogin);
            signupForm.classList.toggle('hidden', isLogin);
            title.textContent = isLogin ? 'Login' : 'Sign Up';
            subtitle.textContent = isLogin ? 'Enter your credentials to continue' : 'Create a new account to get started';
            toggleBtn.textContent = isLogin ? "Don't have an account? Sign Up" : 'Already have an account? Login';
            setStatus('login-status', '', true);
            setStatus('signup-status', '', true);
        });

        // Handle Login Submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const user = getUsers().find(u => u.email === email && u.password === password);
            user
                ? setStatus('login-status', `Welcome back, ${user.name}!`, true)
                : setStatus('login-status', 'Invalid email or password.', false);
        });

        // Handle Signup Submission
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const users = getUsers();

            // Check if user already exists
            if (users.some(u => u.email === email)) {
                setStatus('signup-status', 'Email already registered.', false);
                return;
            }

            // Save new user to LocalStorage
            users.push({ name, email, password });
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            setStatus('signup-status', 'Account created! You can now login.', true);
            signupForm.reset();
        });
    </script>

</body>

</html>
